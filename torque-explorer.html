<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torque Explorer</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Icons (Replacing lucide-react with inline SVGs for the standalone HTML) ---
        const RotateCcw = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const MoveRight = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 8L22 12L18 16"/><path d="M2 12H22"/></svg>
        );
        const ArrowUpRight = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
        );
        const Calculator = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="18" y2="18"/></svg>
        );
        const Info = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        );

        // --- Shared Components ---
        const PhysicsSlider = ({ label, symbol, unit, value, min, max, step, onChange, colorClass }) => (
            <div className="mb-4">
                <div className="flex justify-between items-center mb-1">
                <label className="text-sm font-medium text-slate-700 flex items-center gap-2">
                    <span className={`w-3 h-3 rounded-full ${colorClass}`}></span>
                    {label} ({symbol})
                </label>
                <span className="text-sm font-bold text-slate-900 w-16 text-right">
                    {value} {unit}
                </span>
                </div>
                <input
                type="range"
                min={min}
                max={max}
                step={step}
                value={value}
                onChange={(e) => onChange(parseFloat(e.target.value))}
                className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                />
            </div>
        );

        const ArrowMarkers = () => (
            <defs>
                <marker id="arrow-force" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
                </marker>
                <marker id="arrow-radius" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
                </marker>
                <marker id="arrow-component" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#f87171" opacity="0.7" />
                </marker>
            </defs>
        );

        // --- Level 1: Basic Lever ---
        const Level1Basic = () => {
            const [radius, setRadius] = useState(5);
            const [force, setForce] = useState(10);

            const torque = radius * force;
            const isCCW = torque > 0;
            
            const pivotX = 100;
            const pivotY = 200;
            const scale = 25;
            const forceScale = 5;
            const armEndX = pivotX + radius * scale;

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div className="bg-white p-4 rounded-xl border shadow-sm flex flex-col items-center">
                    <h3 className="text-lg font-semibold mb-2 text-slate-800">Visualization: The Wrench</h3>
                    <svg width="100%" height="400" viewBox="0 0 450 400" className="bg-slate-50 rounded-lg">
                    <ArrowMarkers />
                    <line x1="100" y1="50" x2="100" y2="350" stroke="#e2e8f0" strokeDasharray="4 4" />
                    
                    {/* Wrench Base (Right end ring, handle, Left end head) */}
                    <circle cx={armEndX} cy={pivotY} r="14" fill="#94a3b8" />
                    <circle cx={armEndX} cy={pivotY} r="8" fill="#f8fafc" />
                    <rect x={pivotX} y={pivotY - 10} width={radius * scale} height={20} fill="#94a3b8" />
                    {radius * scale >= 30 && (
                        <rect x={pivotX + 20} y={pivotY - 4} width={(radius * scale) - 30} height={8} fill="#cbd5e1" rx="4" />
                    )}
                    <circle cx={pivotX} cy={pivotY} r="22" fill="#94a3b8" />
                    
                    {/* Wrench Jaws Cutout (matches background bg-slate-50 which is #f8fafc) */}
                    <rect x={pivotX - 30} y={pivotY - 10.5} width="35" height="21" fill="#f8fafc" rx="2" />

                    {/* The Bolt (Hex Nut) */}
                    <polygon points={`${pivotX + 12},${pivotY} ${pivotX + 6},${pivotY + 10.4} ${pivotX - 6},${pivotY + 10.4} ${pivotX - 12},${pivotY} ${pivotX - 6},${pivotY - 10.4} ${pivotX + 6},${pivotY - 10.4}`} fill="#475569" />
                    <circle cx={pivotX} cy={pivotY} r="5" fill="#1e293b" />

                    {/* Radius Vector Overlay */}
                    <line x1={pivotX} y1={pivotY} x2={armEndX} y2={pivotY} stroke="#3b82f6" strokeWidth="3" markerEnd="url(#arrow-radius)" />
                    <rect x={pivotX + (radius*scale)/2 - 35} y={pivotY + 13} width="70" height="22" fill="#f8fafc" opacity="0.8" rx="4" />
                    <text x={pivotX + (radius*scale)/2} y={pivotY + 29} fill="#3b82f6" fontSize="14" textAnchor="middle" fontWeight="bold">r = {radius} m</text>

                    {force !== 0 && (
                        <>
                        <line x1={armEndX} y1={pivotY} x2={armEndX} y2={pivotY - force * forceScale} stroke="#ef4444" strokeWidth="4" markerEnd="url(#arrow-force)" />
                        <text x={armEndX + 15} y={pivotY - (force * forceScale)/2} fill="#ef4444" fontSize="14" fontWeight="bold">F = {Math.abs(force)} N</text>
                        </>
                    )}

                    {torque !== 0 && (
                        <path d={`M 70,200 A 30,30 0 0,${isCCW ? 0 : 1} 130,200`} fill="none" stroke="#8b5cf6" strokeWidth="3" strokeDasharray="5,5" markerEnd="url(#arrow-radius)" />
                    )}
                    {torque !== 0 && (
                        <text x="100" y="160" fill="#8b5cf6" fontSize="16" textAnchor="middle" fontWeight="bold">{isCCW ? 'CCW (+)' : 'CW (-)'}</text>
                    )}
                    </svg>
                </div>

                <div className="flex flex-col gap-6">
                    <div className="bg-white p-6 rounded-xl border shadow-sm">
                    <h3 className="text-lg font-semibold mb-4 text-slate-800 flex items-center gap-2">
                        <MoveRight className="text-blue-600" /> Controls
                    </h3>
                    <p className="text-sm text-slate-600 mb-6">
                        In its simplest form, torque is the product of a force and its perpendicular distance from the pivot point (the lever arm).
                    </p>
                    
                    <PhysicsSlider label="Distance from pivot" symbol="r" unit="m" value={radius} min={1} max={10} step={0.5} onChange={setRadius} colorClass="bg-blue-500" />
                    <PhysicsSlider label="Applied Force" symbol="F" unit="N" value={force} min={-20} max={20} step={1} onChange={setForce} colorClass="bg-red-500" />
                    <p className="text-xs text-slate-500 italic mt-[-10px] mb-4">Positive force pushes UP, negative pulls DOWN.</p>
                    </div>

                    <div className="bg-violet-50 p-6 rounded-xl border border-violet-100 shadow-sm">
                    <h3 className="text-lg font-semibold mb-4 text-violet-900 flex items-center gap-2">
                        <Calculator className="text-violet-600" /> Calculation
                    </h3>
                    <div className="flex flex-col gap-3 font-mono text-lg">
                        <div className="flex justify-between items-center border-b border-violet-200 pb-2">
                        <span className="text-slate-600">Formula:</span>
                        <span className="font-bold text-violet-900">τ = r × F<sub>⊥</sub></span>
                        </div>
                        <div className="flex justify-between items-center border-b border-violet-200 pb-2">
                        <span className="text-slate-600">Equation:</span>
                        <span>τ = ({radius} m) × ({force} N)</span>
                        </div>
                        <div className="flex justify-between items-center pt-2">
                        <span className="text-slate-600">Torque (τ):</span>
                        <span className={`font-bold text-2xl ${torque === 0 ? 'text-slate-500' : (torque > 0 ? 'text-emerald-600' : 'text-rose-600')}`}>
                            {torque > 0 ? '+' : ''}{torque.toFixed(1)} N·m
                        </span>
                        </div>
                        <div className="text-sm text-center mt-2 text-violet-700 font-sans">
                        Direction: {torque === 0 ? 'None' : (isCCW ? 'Counter-Clockwise (Positive)' : 'Clockwise (Negative)')}
                        </div>
                    </div>
                    </div>
                </div>
                </div>
            );
        };

        // --- Level 2: The Angle Factor ---
        const Level2Angle = () => {
            const [radius, setRadius] = useState(6);
            const [force, setForce] = useState(15);
            const [angleDeg, setAngleDeg] = useState(45);

            const angleRad = (angleDeg * Math.PI) / 180;
            const forcePerp = force * Math.sin(angleRad);
            const forceParallel = force * Math.cos(angleRad);
            const torque = radius * forcePerp;

            const pivotX = 100;
            const pivotY = 250;
            const scale = 25; 
            const forceScale = 6; 
            const armEndX = pivotX + radius * scale;

            const forceTipX = armEndX + (forceParallel * forceScale);
            const forceTipY = pivotY - (forcePerp * forceScale);

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div className="bg-white p-4 rounded-xl border shadow-sm flex flex-col items-center">
                    <h3 className="text-lg font-semibold mb-2 text-slate-800">Visualization: Pushing at an Angle</h3>
                    <svg width="100%" height="400" viewBox="0 0 450 400" className="bg-slate-50 rounded-lg">
                    <ArrowMarkers />
                    
                    <rect x="70" y="100" width="20" height="300" fill="#cbd5e1" />
                    <path d="M 90,230 L 110,250 L 90,270 Z" fill="#94a3b8" />
                    <circle cx={pivotX} cy={pivotY} r="5" fill="#334155" />

                    <line x1={pivotX} y1={pivotY} x2={400} y2={pivotY} stroke="#e2e8f0" strokeWidth="2" strokeDasharray="4 4" />
                    <line x1={pivotX} y1={pivotY} x2={armEndX} y2={pivotY} stroke="#3b82f6" strokeWidth="6" strokeLinecap="round"/>
                    <text x={pivotX + (radius*scale)/2} y={pivotY + 20} fill="#3b82f6" fontSize="14" textAnchor="middle" fontWeight="bold">r</text>

                    <path d={`M ${armEndX + 30},${pivotY} A 30,30 0 0,0 ${armEndX + 30 * Math.cos(angleRad)},${pivotY - 30 * Math.sin(angleRad)}`} fill="none" stroke="#64748b" strokeWidth="2" />
                    <text x={armEndX + 40} y={pivotY - 10} fill="#64748b" fontSize="14">θ</text>

                    <line x1={armEndX} y1={pivotY} x2={forceTipX} y2={pivotY} stroke="#f87171" strokeWidth="2" strokeDasharray="4 4" markerEnd="url(#arrow-component)" />
                    <line x1={forceTipX} y1={pivotY} x2={forceTipX} y2={forceTipY} stroke="#f87171" strokeWidth="2" strokeDasharray="4 4" markerEnd="url(#arrow-component)" />
                    
                    <text x={armEndX + (forceParallel*forceScale)/2} y={pivotY + 15} fill="#ef4444" opacity="0.8" fontSize="12" textAnchor="middle">F_parallel (No Torque)</text>
                    <text x={forceTipX + 5} y={pivotY - (forcePerp*forceScale)/2} fill="#ef4444" fontSize="14" fontWeight="bold">F_perp</text>

                    <line x1={armEndX} y1={pivotY} x2={forceTipX} y2={forceTipY} stroke="#ef4444" strokeWidth="3" markerEnd="url(#arrow-force)" />
                    <text x={forceTipX + 10} y={forceTipY - 10} fill="#ef4444" fontSize="16" fontWeight="bold">F</text>
                    </svg>
                </div>

                <div className="flex flex-col gap-6">
                    <div className="bg-white p-6 rounded-xl border shadow-sm">
                    <h3 className="text-lg font-semibold mb-4 text-slate-800 flex items-center gap-2">
                        <ArrowUpRight className="text-blue-600" /> Controls
                    </h3>
                    <p className="text-sm text-slate-600 mb-6">
                        When a force is applied at an angle, only the component of the force that is <strong>perpendicular</strong> to the radius arm creates rotation.
                    </p>
                    
                    <PhysicsSlider label="Radius Arm" symbol="r" unit="m" value={radius} min={1} max={10} step={0.5} onChange={setRadius} colorClass="bg-blue-500" />
                    <PhysicsSlider label="Total Force" symbol="F" unit="N" value={force} min={0} max={30} step={1} onChange={setForce} colorClass="bg-red-500" />
                    <PhysicsSlider label="Angle" symbol="θ" unit="°" value={angleDeg} min={0} max={180} step={5} onChange={setAngleDeg} colorClass="bg-slate-500" />
                    </div>

                    <div className="bg-violet-50 p-6 rounded-xl border border-violet-100 shadow-sm">
                    <div className="flex flex-col gap-3 font-mono text-base">
                        <div className="flex justify-between items-center border-b border-violet-200 pb-2">
                        <span className="text-slate-600">Perpendicular Force:</span>
                        <span className="text-red-600 font-bold">F<sub>⊥</sub> = F · sin(θ)</span>
                        </div>
                        <div className="flex justify-between items-center border-b border-violet-200 pb-2">
                        <span className="text-slate-600">F<sub>⊥</sub> Calculation:</span>
                        <span>{force} · sin({angleDeg}°) = {forcePerp.toFixed(2)} N</span>
                        </div>
                        <div className="flex justify-between items-center border-b border-violet-200 pb-2 pt-2">
                        <span className="text-slate-600">Torque Formula:</span>
                        <span className="font-bold text-violet-900">τ = r · F<sub>⊥</sub></span>
                        </div>
                        <div className="flex justify-between items-center pt-2">
                        <span className="text-slate-600">Total Torque:</span>
                        <span className="font-bold text-2xl text-violet-700">
                            {torque.toFixed(1)} N·m
                        </span>
                        </div>
                    </div>
                    </div>
                </div>
                </div>
            );
        };

        // --- Level 3: 2D Vectors & Cross Product ---
        const Level3Vectors = () => {
            const [rx, setRx] = useState(4);
            const [ry, setRy] = useState(2);
            const [fx, setFx] = useState(-3);
            const [fy, setFy] = useState(5);

            const torque = (rx * fy) - (ry * fx);
            const isCCW = torque > 0;

            const scale = 15;
            const origin = 200;
            
            const mapX = (x) => origin + (x * scale);
            const mapY = (y) => origin - (y * scale);

            const rTipX = mapX(rx);
            const rTipY = mapY(ry);
            const fTipX = mapX(rx + fx);
            const fTipY = mapY(ry + fy);

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div className="bg-white p-4 rounded-xl border shadow-sm flex flex-col items-center">
                    <h3 className="text-lg font-semibold mb-2 text-slate-800">Visualization: Cartesian Vectors</h3>
                    <svg width="100%" height="400" viewBox="0 0 400 400" className="bg-slate-50 rounded-lg">
                    <ArrowMarkers />
                    
                    <defs>
                        <pattern id="grid" width={scale} height={scale} patternUnits="userSpaceOnUse">
                        <path d={`M ${scale} 0 L 0 0 0 ${scale}`} fill="none" stroke="#e2e8f0" strokeWidth="1" />
                        </pattern>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#grid)" />
                    
                    <line x1="0" y1={origin} x2="400" y2={origin} stroke="#94a3b8" strokeWidth="2" />
                    <line x1={origin} y1="0" x2={origin} y2="400" stroke="#94a3b8" strokeWidth="2" />
                    <text x="380" y={origin - 10} fontSize="12" fill="#64748b">x</text>
                    <text x={origin + 10} y="20" fontSize="12" fill="#64748b">y</text>

                    <circle cx={origin} cy={origin} r="4" fill="#334155" />

                    <line x1={origin} y1={origin} x2={rTipX} y2={origin} stroke="#93c5fd" strokeDasharray="3 3" />
                    <line x1={rTipX} y1={origin} x2={rTipX} y2={rTipY} stroke="#93c5fd" strokeDasharray="3 3" />

                    <line x1={origin} y1={origin} x2={rTipX} y2={rTipY} stroke="#3b82f6" strokeWidth="3" markerEnd="url(#arrow-radius)" />
                    <text x={origin + (rTipX-origin)/2 - 10} y={origin + (rTipY-origin)/2 - 10} fill="#3b82f6" fontWeight="bold">r</text>

                    <line x1={rTipX} y1={rTipY} x2={fTipX} y2={rTipY} stroke="#fca5a5" strokeDasharray="3 3" />
                    <line x1={fTipX} y1={rTipY} x2={fTipX} y2={fTipY} stroke="#fca5a5" strokeDasharray="3 3" />

                    <line x1={rTipX} y1={rTipY} x2={fTipX} y2={fTipY} stroke="#ef4444" strokeWidth="3" markerEnd="url(#arrow-force)" />
                    <text x={rTipX + (fTipX-rTipX)/2 + 10} y={rTipY + (fTipY-rTipY)/2 - 10} fill="#ef4444" fontWeight="bold">F</text>

                    {torque !== 0 && (
                        <path d={`M ${origin-20},${origin} A 20,20 0 0,${isCCW ? 0 : 1} ${origin+20},${origin}`} fill="none" stroke="#8b5cf6" strokeWidth="3" markerEnd="url(#arrow-radius)" />
                    )}
                    </svg>
                </div>

                <div className="flex flex-col gap-6">
                    <div className="bg-white p-6 rounded-xl border shadow-sm">
                    <h3 className="text-lg font-semibold mb-4 text-slate-800 flex items-center gap-2">
                        <Info className="text-blue-600" /> Vector Components
                    </h3>
                    <p className="text-sm text-slate-600 mb-6">
                        In formal physics, we use the <strong>cross product</strong> of vectors. In 2D, this can be calculated using the x and y components of the radius and force vectors.
                    </p>
                    
                    <div className="grid grid-cols-2 gap-4 border-l-4 border-blue-500 pl-4 mb-4 bg-slate-50 p-3 rounded">
                        <h4 className="col-span-2 font-bold text-sm text-blue-800">Position Vector (r)</h4>
                        <PhysicsSlider label="X Position" symbol="r_x" unit="m" value={rx} min={-10} max={10} step={1} onChange={setRx} colorClass="bg-blue-400" />
                        <PhysicsSlider label="Y Position" symbol="r_y" unit="m" value={ry} min={-10} max={10} step={1} onChange={setRy} colorClass="bg-blue-600" />
                    </div>

                    <div className="grid grid-cols-2 gap-4 border-l-4 border-red-500 pl-4 bg-slate-50 p-3 rounded">
                        <h4 className="col-span-2 font-bold text-sm text-red-800">Force Vector (F)</h4>
                        <PhysicsSlider label="X Force" symbol="F_x" unit="N" value={fx} min={-10} max={10} step={1} onChange={setFx} colorClass="bg-red-400" />
                        <PhysicsSlider label="Y Force" symbol="F_y" unit="N" value={fy} min={-10} max={10} step={1} onChange={setFy} colorClass="bg-red-600" />
                    </div>
                    </div>

                    <div className="bg-violet-50 p-6 rounded-xl border border-violet-100 shadow-sm">
                    <h3 className="text-lg font-semibold mb-4 text-violet-900">The Cross Product</h3>
                    <div className="flex flex-col gap-3 font-mono text-sm md:text-base">
                        <div className="bg-white p-3 rounded border border-violet-200 text-center">
                        <div className="font-bold text-violet-900 mb-2">τ = (r<sub>x</sub> · F<sub>y</sub>) - (r<sub>y</sub> · F<sub>x</sub>)</div>
                        </div>
                        
                        <div className="flex justify-between items-center mt-2">
                        <span className="text-slate-600">Term 1 (r<sub>x</sub>F<sub>y</sub>):</span>
                        <span>({rx}) · ({fy}) = {rx * fy}</span>
                        </div>
                        <div className="flex justify-between items-center border-b border-violet-200 pb-2">
                        <span className="text-slate-600">Term 2 (r<sub>y</sub>F<sub>x</sub>):</span>
                        <span>({ry}) · ({fx}) = {ry * fx}</span>
                        </div>
                        
                        <div className="flex justify-between items-center pt-2">
                        <span className="text-slate-600 font-sans font-semibold">Resulting Torque (τ<sub>z</sub>):</span>
                        <span className={`font-bold text-xl ${torque === 0 ? 'text-slate-500' : (torque > 0 ? 'text-emerald-600' : 'text-rose-600')}`}>
                            {torque > 0 ? '+' : ''}{torque} N·m
                        </span>
                        </div>
                        <div className="text-sm text-center mt-1 text-violet-700 font-sans">
                        (Vector points {torque > 0 ? 'OUT of' : (torque < 0 ? 'INTO' : 'nowhere on')} the screen)
                        </div>
                    </div>
                    </div>
                </div>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            const [activeTab, setActiveTab] = useState(1);

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans">
                <div className="max-w-6xl mx-auto space-y-6">
                    
                    {/* Header */}
                    <header className="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-200">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                        <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Torque Explorer</h1>
                        <p className="text-slate-500 mt-2 max-w-2xl">
                            A step-by-step interactive guide for university physics. 
                            Start building intuition before diving into vector math.
                        </p>
                        <p className="text-sm text-slate-400 mt-4 font-medium">
                            Created by Suyong Choi, Korea University
                        </p>
                        </div>
                        <div className="bg-blue-50 text-blue-700 px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 border border-blue-100">
                        <RotateCcw size={18} /> τ = r × F
                        </div>
                    </div>
                    </header>

                    {/* Tab Navigation */}
                    <div className="flex overflow-x-auto bg-white rounded-xl shadow-sm p-1 border border-slate-200 gap-1">
                    {[
                        { id: 1, title: 'Level 1: The Intuitive Lever', desc: 'Perpendicular forces' },
                        { id: 2, title: 'Level 2: The Angle Factor', desc: 'Forces at angles' },
                        { id: 3, title: 'Level 3: 2D Vectors', desc: 'Components & Cross Product' }
                    ].map((tab) => (
                        <button
                        key={tab.id}
                        onClick={() => setActiveTab(tab.id)}
                        className={`flex-1 flex flex-col items-center justify-center py-3 px-4 rounded-lg transition-all duration-200 whitespace-nowrap min-w-[150px]
                            ${activeTab === tab.id 
                            ? 'bg-blue-600 text-white shadow-md' 
                            : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
                        >
                        <span className="font-bold text-sm md:text-base">{tab.title}</span>
                        <span className={`text-xs mt-1 ${activeTab === tab.id ? 'text-blue-200' : 'text-slate-400'}`}>
                            {tab.desc}
                        </span>
                        </button>
                    ))}
                    </div>

                    {/* Active Content Area */}
                    <main className="transition-opacity duration-300">
                    {activeTab === 1 && <Level1Basic />}
                    {activeTab === 2 && <Level2Angle />}
                    {activeTab === 3 && <Level3Vectors />}
                    </main>

                </div>
                </div>
            );
        };

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
